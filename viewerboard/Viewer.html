<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Courtside — Live View</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #0a0c10;
  --panel: #12161c;
  --panel-raised: #171c24;
  --line: #232a35;
  --text: #e9edf3;
  --text-dim: #7d8898;
  --teamA-color: #2f7ef0;
  --teamB-color: #ff6a3d;
  --warn: #ff3b30;
  --amber: #ffb020;
  --good: #35d07f;
  --font-display: 'Orbitron', sans-serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'Share Tech Mono', monospace;
  --radius: 16px;
}

*{ box-sizing: border-box; }

html,body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(1400px 700px at 50% -10%, #151b24 0%, var(--bg) 60%);
  color:var(--text);
  font-family:var(--font-body);
  overflow-x:hidden;
}

/* faint scanline texture across the whole broadcast — the one signature flourish */
body::before{
  content:"";
  position:fixed; inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.018) 0px,
    rgba(255,255,255,0.018) 1px,
    transparent 1px,
    transparent 3px
  );
  z-index:1;
}

.jumbotron{
  max-width:1320px;
  margin:0 auto;
  padding:22px 18px 34px;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* ---------------- top status bar ---------------- */
.statusbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:4px 6px 20px;
}
.brand{
  font-family:var(--font-display);
  font-weight:900;
  letter-spacing:0.35em;
  font-size:13px;
  color:var(--text-dim);
  display:flex;
  align-items:baseline;
  gap:10px;
}
.brand .tag{
  font-family:var(--font-mono);
  font-weight:400;
  letter-spacing:0.2em;
  font-size:10px;
  color:var(--text-dim);
  opacity:.7;
}

.live-block{
  display:flex;
  align-items:center;
  gap:9px;
  font-family:var(--font-mono);
  font-size:12px;
  letter-spacing:0.12em;
  color:var(--text-dim);
}
.live-ring{
  position:relative;
  width:10px; height:10px;
}
.live-ring .core{
  position:absolute; inset:2px;
  border-radius:50%;
  background:var(--good);
  box-shadow:0 0 8px var(--good);
}
.live-ring .pulse{
  position:absolute; inset:0;
  border-radius:50%;
  background:var(--good);
  animation:pulse-ring 1.8s cubic-bezier(.4,0,.3,1) infinite;
}
.live-block.stale .core{ background:var(--amber); box-shadow:0 0 8px var(--amber); }
.live-block.stale .pulse{ background:var(--amber); animation-duration:2.6s; }
.live-block.offline .core{ background:var(--warn); box-shadow:0 0 8px var(--warn); }
.live-block.offline .pulse{ display:none; }
@keyframes pulse-ring{
  0%{ transform:scale(1); opacity:.55; }
  100%{ transform:scale(2.6); opacity:0; }
}

/* ---------------- center clock module ---------------- */
.clock-band{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  padding:6px 0 26px;
}
.period-readout{
  font-family:var(--font-mono);
  letter-spacing:0.3em;
  font-size:14px;
  color:var(--text-dim);
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:20px;
  padding:6px 22px;
}
.clock-face{
  background:#05070a;
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px 40px;
  text-align:center;
  transition:border-color .2s;
}
.clock-face.warning{ border-color:var(--warn); }
.clock-face.warning #clockDisplay{ color:var(--warn); text-shadow:0 0 22px rgba(255,59,48,.6); }
#clockDisplay{
  font-family:var(--font-display);
  font-weight:900;
  font-size:min(15vw, 96px);
  color:var(--amber);
  letter-spacing:0.04em;
  font-variant-numeric:tabular-nums;
  text-shadow:0 0 24px color-mix(in srgb, var(--amber) 55%, transparent);
  line-height:1;
}

/* ---------------- scoreboard grid ---------------- */
.board{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:18px;
  flex:1;
}
.vs-mark{
  font-family:var(--font-display);
  font-weight:700;
  font-size:20px;
  color:var(--text-dim);
  letter-spacing:0.1em;
  opacity:.6;
}

.team{
  background:linear-gradient(180deg, var(--panel-raised), var(--panel));
  border:1px solid var(--line);
  border-top:4px solid var(--team-color);
  border-radius:var(--radius);
  padding:26px 20px 22px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;
  text-align:center;
}
.team--a{ --team-color: var(--teamA-color); }
.team--b{ --team-color: var(--teamB-color); }

.team-name{
  font-family:var(--font-display);
  font-weight:700;
  font-size:clamp(16px, 2.4vw, 22px);
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--text);
  min-height:1.2em;
}

.score-number{
  font-family:var(--font-display);
  font-weight:900;
  font-size:clamp(64px, 13vw, 128px);
  line-height:1;
  color:var(--team-color);
  text-shadow:0 0 34px color-mix(in srgb, var(--team-color) 55%, transparent);
  font-variant-numeric:tabular-nums;
}

.sub-stats{
  display:flex;
  gap:10px;
  width:100%;
  justify-content:center;
}
.stat{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:10px;
  padding:8px 16px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  min-width:64px;
}
.stat-label{
  font-size:9px;
  letter-spacing:0.18em;
  color:var(--text-dim);
}
.stat-value{
  font-family:var(--font-mono);
  font-size:22px;
}
.stat-value.at-limit{
  color:var(--warn);
  font-weight:bold;
  text-shadow:0 0 8px color-mix(in srgb, var(--warn) 55%, transparent);
}

/* ---------------- footer ---------------- */
.foot-note{
  margin-top:26px;
  text-align:center;
  font-size:11px;
  color:var(--text-dim);
  font-family:var(--font-mono);
  letter-spacing:0.05em;
}

@media (max-width: 760px){
  .board{ grid-template-columns:1fr; }
  .vs-mark{ display:none; }
}

/* flash on final countdown, mirrors the admin panel */
@keyframes flash-bg{
  0%,100%{ background-color:transparent; }
  50%{ background-color:rgba(255,59,48,0.12); }
}
.jumbotron.flashing{ animation:flash-bg 1s steps(2,end) infinite; }
</style>
</head>
<body>

<div class="jumbotron" id="jumbotron">

  <div class="statusbar">
    <div class="brand">COURTSIDE <span class="tag">LIVE VIEW</span></div>
    <div class="live-block" id="liveBlock">
      <span class="live-ring"><span class="pulse"></span><span class="core"></span></span>
      <span id="liveLabel">connecting…</span>
    </div>
  </div>

  <div class="clock-band">
    <span class="period-readout" id="periodLabel">Q1</span>
    <div id="clockFace" class="clock-face">
      <span id="clockDisplay">00:00.0</span>
    </div>
  </div>

  <div class="board">
    <section class="team team--a">
      <div class="team-name" id="nameA">TEAM A</div>
      <div class="score-number" id="scoreA">0</div>
      <div class="sub-stats">
        <div class="stat"><span class="stat-label">FOULS</span><span id="foulA" class="stat-value">0</span></div>
        <div class="stat"><span class="stat-label">T/O</span><span id="toA" class="stat-value">3</span></div>
      </div>
    </section>

    <span class="vs-mark">VS</span>

    <section class="team team--b">
      <div class="team-name" id="nameB">TEAM B</div>
      <div class="score-number" id="scoreB">0</div>
      <div class="sub-stats">
        <div class="stat"><span class="stat-label">FOULS</span><span id="foulB" class="stat-value">0</span></div>
        <div class="stat"><span class="stat-label">T/O</span><span id="toB" class="stat-value">3</span></div>
      </div>
    </section>
  </div>

  <div class="foot-note" id="footNote">reading Tbl_team &amp; Tbl_buffer via backend.php</div>

</div>

<script>
/* =========================================================
   Courtside — Live View (read-only)
   Polls backend.php on an interval and renders whatever the
   admin panel (index.html/script.js) last saved to
   Tbl_team / Tbl_buffer. No writes happen from this page.
   ========================================================= */

const API_URL = "backend.php";
const POLL_MS = 1000;        // how often to re-fetch from the DB
const STALE_AFTER_MS = 4000; // no successful update in this long -> "stale"
const WARNING_SECONDS = 3;   // last N seconds highlighted red, same as admin
const STAT_MAX = 5;

const el = (id) => document.getElementById(id);
const clockDisplay = el("clockDisplay");
const clockFace = el("clockFace");
const periodLabel = el("periodLabel");
const jumbotron = el("jumbotron");
const liveBlock = el("liveBlock");
const liveLabel = el("liveLabel");
const footNote = el("footNote");

const PERIOD_NAMES = ["Q1", "Q2", "Q3", "Q4"];

let lastSuccessAt = null;
let consecutiveFailures = 0;

function formatClockFromDb(str) {
  // DB stores "mm:ss.mmm" — display it the same way the admin clock does: mm:ss.t
  if (!str) return "00:00.0";
  const match = /^(\d{1,2}):(\d{2})\.(\d{1,3})$/.exec(str.trim());
  if (!match) return str;
  const [, mm, ss, ms] = match;
  const tenth = ms.padStart(3, "0")[0];
  return `${mm.padStart(2, "0")}:${ss}.${tenth}`;
}

function secondsLeftFromClock(str) {
  const match = /^(\d{1,2}):(\d{2})\.(\d{1,3})$/.exec((str || "").trim());
  if (!match) return null;
  const [, mm, ss, ms] = match;
  return parseInt(mm, 10) * 60 + parseInt(ss, 10) + parseInt(ms.padStart(3, "0"), 10) / 1000;
}

function updateStatCap(id, value) {
  const valueEl = el(id);
  valueEl.classList.toggle("at-limit", value >= STAT_MAX);
}

function renderLiveStatus() {
  liveBlock.classList.remove("stale", "offline");
  if (!lastSuccessAt) {
    liveLabel.textContent = "connecting…";
    return;
  }
  const age = Date.now() - lastSuccessAt;
  if (consecutiveFailures >= 3) {
    liveBlock.classList.add("offline");
    liveLabel.textContent = "offline";
  } else if (age > STALE_AFTER_MS) {
    liveBlock.classList.add("stale");
    liveLabel.textContent = "delayed";
  } else {
    liveLabel.textContent = "live";
  }
}

function renderFromData(data) {
  const teamRows = {};
  (data.team || []).forEach((row) => { teamRows[row.id] = row; });
  const bufferRows = {};
  (data.buffer || []).forEach((row) => { bufferRows[row.id] = row; });

  const map = { 1: "A", 2: "B" };
  Object.entries(map).forEach(([id, team]) => {
    const buf = bufferRows[id] || {};
    const name = (buf.Team && String(buf.Team).trim()) || `TEAM ${team}`;
    el(`name${team}`).textContent = name;
    el(`score${team}`).textContent = Number(buf.Points) || 0;
    const foul = Number(buf.Foul) || 0;
    const to = buf["T/O"] !== undefined && buf["T/O"] !== null ? Number(buf["T/O"]) : 3;
    el(`foul${team}`).textContent = foul;
    el(`to${team}`).textContent = to;
    updateStatCap(`foul${team}`, foul);
    updateStatCap(`to${team}`, to);
  });

  // quarter / OT / clock are shared, canonical off Tbl_team (either row)
  const trow = teamRows[1] || teamRows[2];
  if (trow) {
    const quarter = Math.max(1, Number(trow.quarter) || 1);
    const ot = Number(trow.OT) || 0;
    periodLabel.textContent = ot > 0 ? `OT${ot}` : PERIOD_NAMES[Math.min(quarter, 4) - 1];

    const clockStr = formatClockFromDb(trow.Clock);
    clockDisplay.textContent = clockStr;

    const secondsLeft = secondsLeftFromClock(trow.Clock);
    const inWarning = secondsLeft !== null && secondsLeft <= WARNING_SECONDS && secondsLeft >= 0;
    clockFace.classList.toggle("warning", inWarning);
    jumbotron.classList.toggle("flashing", inWarning);
  }
}

async function pollOnce() {
  try {
    const res = await fetch(API_URL, { method: "GET", cache: "no-store" });
    if (!res.ok) throw new Error("bad response");
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || "backend error");
    renderFromData(data);
    lastSuccessAt = Date.now();
    consecutiveFailures = 0;
    footNote.textContent = "reading tbl_team & tbl_buffer via backend.php (polling)";
  } catch (err) {
    consecutiveFailures++;
    footNote.textContent = "can't reach backend.php — check it's running alongside this page";
  }
  renderLiveStatus();
}

// keep the "live / delayed / offline" pill accurate even between updates
setInterval(renderLiveStatus, 500);

/* ---------------------------------------------------------
   Real-time feed via Server-Sent Events.
   backend.php?stream=1 holds one connection open and pushes a
   new payload the instant tbl_team/tbl_buffer actually change —
   there's no client-side timer to throttle in the background,
   so this keeps updating even while the tab isn't focused.
   EventSource reconnects automatically if the connection drops
   (including when backend.php's 5-minute loop cycles).
   --------------------------------------------------------- */
let usingStream = false;
let fallbackTimer = null;

function startPollingFallback() {
  if (fallbackTimer) return;
  usingStream = false;
  pollOnce();
  fallbackTimer = setInterval(pollOnce, POLL_MS);
}

function stopPollingFallback() {
  if (fallbackTimer) { clearInterval(fallbackTimer); fallbackTimer = null; }
}

if (typeof EventSource !== "undefined") {
  const stream = new EventSource(`${API_URL}?stream=1`);

  stream.onmessage = (e) => {
    stopPollingFallback();
    usingStream = true;
    try {
      const data = JSON.parse(e.data);
      if (!data.ok) throw new Error(data.error || "backend error");
      renderFromData(data);
      lastSuccessAt = Date.now();
      consecutiveFailures = 0;
      footNote.textContent = "live feed via backend.php?stream=1 (push)";
    } catch (err) {
      consecutiveFailures++;
    }
    renderLiveStatus();
  };

  stream.onerror = () => {
    // EventSource retries on its own; if it stays down a few seconds,
    // fall back to polling so the display never fully stalls
    consecutiveFailures++;
    renderLiveStatus();
    if (!usingStream) startPollingFallback();
  };
} else {
  // very old browsers without EventSource support
  startPollingFallback();
}

// instant catch-up if a background tab ever does miss a beat
document.addEventListener("visibilitychange", () => { if (!document.hidden) (usingStream ? null : pollOnce()); });
</script>

</body>
</html>
